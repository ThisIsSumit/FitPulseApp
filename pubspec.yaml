name: fitness_app
description: A comprehensive fitness app with community features — Supabase backend
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase 
  supabase_flutter: ^2.5.6

  # State Management
  provider: ^6.1.2

  # Navigation
  go_router: ^17.3.0

  # UI & Animations
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fl_chart: ^1.2.0
  percent_indicator: ^4.2.3
  smooth_page_indicator: ^2.0.1
  flutter_staggered_animations: ^1.1.1

  # Image
  image_picker: ^1.1.2

  # Utils
  intl: ^0.20.2
  shared_preferences: ^2.3.1
  uuid: ^4.4.2
  timeago: ^3.6.1

  # Icons
  flutter_svg: ^2.0.10+1
  cupertino_icons: ^1.0.8

  # steps
  pedometer: ^4.0.2
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
